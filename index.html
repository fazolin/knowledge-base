<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caio Fazolin · Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --surface: #1c1c1c;
      --surface-2: #242424;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --muted: #666;
      --muted-2: #3a3a3a;
      --radius: 14px;
      --gap: 14px;
    }

    html { color-scheme: dark; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      max-width: 1320px;
      margin: 0 auto;
      padding: 56px 32px 0;
    }

    .brand-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .brand-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1.2px;
      line-height: 1;
      color: var(--text);
      margin-bottom: 24px;
    }

    .header-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #search {
      flex: 1;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 400;
      outline: none;
      padding: 10px 16px;
      transition: border-color 0.15s;
    }

    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--border-hover); }

    .header-count {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .tags-wrap {
      max-width: 1320px;
      margin: 20px auto 0;
      padding: 0 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
      white-space: nowrap;
    }

    .tag-btn:hover { color: var(--text); border-color: var(--border-hover); }

    .tag-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .tag-btn-count {
      margin-left: 4px;
      font-size: 10px;
      opacity: 0.4;
    }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 32px 80px;
    }

    .month-group { margin-bottom: 48px; }

    .month-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .month-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .month-line { flex: 1; height: 1px; background: var(--border); }

    .month-count {
      font-size: 10px;
      color: var(--muted-2);
      white-space: nowrap;
    }

    .masonry {
      column-count: 4;
      column-gap: var(--gap);
    }

    .card {
      break-inside: avoid;
      display: block;
      width: 100%;
      margin-bottom: var(--gap);
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.18s;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
    }

    .card-img-wrap { width: 100%; overflow: hidden; }

    .card-img {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .card-nothumb {
      width: 100%;
      height: 130px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .nt-bg { position: absolute; inset: 0; }

    .nt-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.35) 100%);
    }

    .nt-domain {
      position: relative;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: rgba(255,255,255,0.18);
      text-align: center;
      word-break: break-all;
      line-height: 1.2;
    }

    .card-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }

    .card-desc {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.65;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 2px;
    }

    .card-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .pill {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .card-arrow {
      font-size: 14px;
      color: var(--muted-2);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card:hover .card-arrow { opacity: 1; }

    .empty {
      padding: 80px 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1100px) { .masonry { column-count: 3; } }

    @media (max-width: 768px) {
      .masonry { column-count: 2; }
      .header { padding: 40px 20px 0; }
      .tags-wrap { padding: 0 20px; }
      main { padding: 24px 20px 60px; }
      .brand-title { font-size: 28px; }
    }

    @media (max-width: 480px) {
      .masonry { column-count: 2; }
      .header { padding: 28px 16px 0; }
      .brand-title { font-size: 24px; letter-spacing: -0.8px; }
      .tags-wrap { padding: 0 16px; }
      main { padding: 20px 16px 60px; }
      #search { max-width: 100%; }
    }

    @media (max-width: 380px) {
      .masonry { column-count: 1; }
    }
  </style>
</head>
<body>

<div class="header">
  <p class="brand-eyebrow">Caio Fazolin</p>
  <h1 class="brand-title">Knowledge Base</h1>
  <div class="header-bar">
    <input type="text" id="search" placeholder="Buscar links, tags ou descrições...">
    <span class="header-count" id="count"></span>
  </div>
</div>

<div class="tags-wrap" id="tags"></div>

<main id="main"></main>

<script>
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  let all = [], activeTag = 'all', q = '';

  async function init() {
    all = await fetch('links.json').then(r => r.json());
    buildTags();
    render();
  }

  function buildTags() {
    const counts = {};
    all.forEach(l => l.tags.forEach(t => { counts[t] = (counts[t]||0)+1; }));
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    const wrap = document.getElementById('tags');
    wrap.innerHTML = '';
    wrap.appendChild(tagBtn('all','Tudo',all.length));
    sorted.forEach(([t,n]) => wrap.appendChild(tagBtn(t, t.replace('#',''), n)));
  }

  function tagBtn(value, label, count) {
    const b = document.createElement('button');
    b.className = 'tag-btn' + (value === activeTag ? ' active' : '');
    b.innerHTML = `${label}<span class="tag-btn-count">${count}</span>`;
    b.onclick = () => {
      activeTag = value;
      document.querySelectorAll('.tag-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      render();
    };
    return b;
  }

  function render() {
    const sq = q.toLowerCase();
    const filtered = all.filter(l => {
      const mt = activeTag === 'all' || l.tags.includes(activeTag);
      const mq = !sq || l.title.toLowerCase().includes(sq)
        || (l.description||'').toLowerCase().includes(sq)
        || l.tags.some(t => t.toLowerCase().includes(sq));
      return mt && mq;
    });

    document.getElementById('count').textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;

    const main = document.getElementById('main');
    if (!filtered.length) {
      main.innerHTML = '<div class="empty">Nenhum resultado encontrado.</div>';
      return;
    }

    const groups = {};
    filtered.forEach(l => {
      const d = new Date(l.addedAt + 'T12:00:00');
      const k = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
      if (!groups[k]) groups[k] = { year: d.getFullYear(), month: d.getMonth(), items: [] };
      groups[k].items.push(l);
    });

    main.innerHTML = '';
    Object.keys(groups).sort().reverse().forEach(k => {
      const { year, month, items } = groups[k];
      const sec = document.createElement('div');
      sec.className = 'month-group';
      sec.innerHTML = `
        <div class="month-header">
          <span class="month-label">${MONTHS[month]} · ${year}</span>
          <div class="month-line"></div>
          <span class="month-count">${items.length} ${items.length === 1 ? 'item' : 'itens'}</span>
        </div>
        <div class="masonry"></div>
      `;
      const grid = sec.querySelector('.masonry');
      items.forEach(l => grid.appendChild(makeCard(l)));
      main.appendChild(sec);
    });
  }

  function grad(id) {
    let h = 0;
    for (let i = 0; i < id.length; i++) h = (id.charCodeAt(i) + ((h<<5)-h))|0;
    const hue = ((h>>>0) % 300) + 20;
    return `linear-gradient(140deg, hsl(${hue},45%,22%) 0%, hsl(${(hue+70)%360},35%,12%) 100%)`;
  }

  function host(url) {
    try { return new URL(url).hostname.replace('www.',''); } catch { return ''; }
  }

  window.onImgErr = (img, id, h) => {
    img.closest('.card-img-wrap').innerHTML = noThumb(id, h);
  };

  function noThumb(id, h) {
    return `<div class="card-nothumb">
      <div class="nt-bg" style="background:${grad(id)}"></div>
      <div class="nt-overlay"></div>
      <span class="nt-domain">${h}</span>
    </div>`;
  }

  function makeCard(l) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = l.url;
    a.target = '_blank';
    a.rel = 'noopener';

    const h = host(l.url);
    const pills = l.tags.slice(0,3).map(t =>
      `<span class="pill">${t.replace('#','')}</span>`).join('');

    let media = '';
    if (l.thumbnail) {
      media = `<div class="card-img-wrap">
        <img class="card-img" src="${l.thumbnail}" alt="${l.title}" loading="lazy"
          onerror="onImgErr(this,'${l.id}','${h.replace(/'/g,"\\'")}')"> 
      </div>`;
    } else {
      media = noThumb(l.id, h);
    }

    a.innerHTML = `${media}
      <div class="card-body">
        <div class="card-title">${l.title}</div>
        ${l.description ? `<div class="card-desc">${l.description}</div>` : ''}
        <div class="card-meta">
          <div class="card-pills">${pills}</div>
          <span class="card-arrow">↗</span>
        </div>
      </div>`;
    return a;
  }

  document.getElementById('search').addEventListener('input', e => { q = e.target.value; render(); });
  init();
</script>
</body>
</html>
