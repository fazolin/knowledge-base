<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f3ef;
      --surface: #ffffff;
      --border: #e4e2db;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #1a1a1a;
      --tag-bg: #ebebeb;
      --tab-active-bg: #1a1a1a;
      --tab-active-text: #ffffff;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 40px 24px 0;
      max-width: 1200px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }

    .search-wrap {
      margin-top: 20px;
    }

    #search {
      width: 100%;
      max-width: 400px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--surface);
      outline: none;
      color: var(--text);
      transition: border-color 0.15s;
    }

    #search:focus { border-color: #999; }

    nav {
      max-width: 1200px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 4px;
    }

    nav::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }

    .tab:hover { border-color: #aaa; color: var(--text); }

    .tab.active {
      background: var(--tab-active-bg);
      color: var(--tab-active-text);
      border-color: var(--tab-active-bg);
    }

    .tab .count {
      display: inline-block;
      margin-left: 5px;
      opacity: 0.55;
      font-size: 11px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--bg);
      display: block;
    }

    .card-thumb-fallback {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #e8e6df 0%, #d4d1c8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      color: #b0ad9e;
      letter-spacing: -1px;
    }

    .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag-pill {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--muted);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s;
    }

    .tag-pill:hover { background: #ddd; }

    .card-footer {
      padding: 0 16px 16px;
    }

    .btn-link {
      display: block;
      text-align: center;
      padding: 9px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .btn-link:hover { opacity: 0.8; }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 15px;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 22px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Knowledge Base</h1>
  <p>Links, referências e recursos organizados por categoria.</p>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Buscar...">
  </div>
</header>

<nav id="tabs"></nav>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>
  let allLinks = [];
  let activeTag = 'all';
  let searchQuery = '';

  const DATA = [{"id":"open-generative-ai","title":"Open Generative AI","url":"https://github.com/Anil-matcha/Open-Generative-AI","description":"Estúdio de IA open-source e self-hostable para geração de imagens, vídeos e animações. Acesso a 200+ modelos (Flux, Midjourney, Kling, Sora) sem filtros de conteúdo ou assinatura.","thumbnail":"https://github.com/Anil-matcha.png","tags":["#ai","#generative-ai","#open-source","#image-generation","#video-generation","#self-hosted","#tools"],"addedAt":"2026-04-22"},{"id":"google-design","title":"Google Design","url":"https://design.google/","description":"Portal oficial do Google sobre cultura e prática de design. Artigos, cases, pesquisas e recursos sobre UX, tipografia, Material Design e identidade visual.","thumbnail":"https://design.google/static/img/share.png","tags":["#design","#ux","#ui","#reference","#google","#professional"],"addedAt":"2026-04-22"},{"id":"claude-plugin-figma","title":"Figma Plugin for Claude","url":"https://claude.ai/plugins/figma","description":"Conecta arquivos Figma, tokens e componentes ao Claude Code para implementar interfaces com mais fidelidade visual.","tags":["#claude-plugin","#claude-code","#figma","#design","#ui","#professional"],"addedAt":"2026-04-22"},{"id":"claude-plugin-frontend-design","title":"Frontend Design Plugin for Claude","url":"https://claude.ai/plugins/frontend-design","description":"Ajuda a gerar interfaces mais polidas e menos genéricas, com melhor direção visual, tipografia e composição.","tags":["#claude-plugin","#claude-code","#frontend","#design","#ui","#professional"],"addedAt":"2026-04-22"},{"id":"claude-plugin-playwright","title":"Playwright Plugin for Claude","url":"https://claude.ai/plugins/playwright","description":"Executa fluxos E2E, screenshots, validações e QA funcional diretamente a partir do Claude Code.","tags":["#claude-plugin","#claude-code","#testing","#automation","#e2e","#professional"],"addedAt":"2026-04-22"},{"id":"context7","title":"Context7","url":"https://context7.com","description":"Injeta documentação atualizada e versionada de bibliotecas no contexto do agente.","tags":["#claude-plugin","#claude-code","#documentation","#developer-tools","#professional"],"addedAt":"2026-04-22"},{"id":"claude-plugin-github","title":"GitHub Plugin for Claude","url":"https://claude.ai/plugins/github","description":"Permite revisar PRs, abrir issues, consultar Actions e trabalhar com o ciclo completo de entrega diretamente no Claude Code.","tags":["#claude-plugin","#claude-code","#github","#devops","#professional"],"addedAt":"2026-04-22"},{"id":"claude-plugin-superpowers","title":"Superpowers Plugin for Claude","url":"https://claude.ai/plugins/superpowers","description":"Pacote de skills para brainstorming, planejamento, TDD, revisão e execução mais disciplinada.","tags":["#claude-plugin","#claude-code","#workflow","#productivity","#professional"],"addedAt":"2026-04-22"},{"id":"n8n","title":"n8n","url":"https://github.com/n8n-io/n8n","description":"Plataforma visual e extensível para automações, integrações, agentes e workflows com forte comunidade open-source.","thumbnail":"https://github.com/n8n-io.png","tags":["#automation","#workflow","#open-source","#self-hosted","#no-code","#professional"],"addedAt":"2026-04-22"},{"id":"postiz","title":"Postiz","url":"https://github.com/gitroomhq/postiz-app","description":"Plataforma open-source para agendamento social, analytics, colaboração e publicação multi-canal.","thumbnail":"https://github.com/gitroomhq.png","tags":["#social-media","#open-source","#self-hosted","#marketing","#tools"],"addedAt":"2026-04-22"},{"id":"ghost-cms","title":"Ghost","url":"https://github.com/TryGhost/Ghost","description":"Stack editorial moderna para blog, newsletter, memberships e distribuição de conteúdo.","thumbnail":"https://github.com/TryGhost.png","tags":["#cms","#blog","#newsletter","#open-source","#self-hosted","#content"],"addedAt":"2026-04-22"},{"id":"claude-plugin-serena","title":"Serena Plugin for Claude","url":"https://claude.ai/plugins/serena","description":"Faz navegação e edição semântica em bases de código grandes, melhorando refatorações e entendimento estrutural.","tags":["#claude-plugin","#claude-code","#refactoring","#developer-tools","#professional"],"addedAt":"2026-04-22"},{"id":"firecrawl","title":"Firecrawl","url":"https://github.com/mendableai/firecrawl","description":"Faz busca, scraping e interação com a web em formato pronto para agentes de IA.","thumbnail":"https://github.com/mendableai.png","tags":["#scraping","#crawling","#ai","#open-source","#developer-tools","#professional"],"addedAt":"2026-04-22"},{"id":"kestra","title":"Kestra","url":"https://github.com/kestra-io/kestra","description":"Orquestrador declarativo para pipelines, jobs, ETL leve e fluxos criativos com estado.","thumbnail":"https://github.com/kestra-io.png","tags":["#orchestration","#workflow","#etl","#open-source","#self-hosted","#professional"],"addedAt":"2026-04-22"}];

  async function init() {
    allLinks = DATA;
    buildTabs();
    render();
  }

  function buildTabs() {
    const counts = {};
    allLinks.forEach(link => {
      link.tags.forEach(tag => {
        counts[tag] = (counts[tag] || 0) + 1;
      });
    });

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

    const nav = document.getElementById('tabs');
    nav.innerHTML = '';

    const allTab = makeTab('all', 'Tudo', allLinks.length);
    nav.appendChild(allTab);

    sorted.forEach(([tag, count]) => {
      nav.appendChild(makeTab(tag, tag.replace('#', ''), count));
    });
  }

  function makeTab(value, label, count) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (value === activeTag ? ' active' : '');
    btn.innerHTML = `${label}<span class="count">${count}</span>`;
    btn.addEventListener('click', () => {
      activeTag = value;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    return btn;
  }

  function render() {
    const grid = document.getElementById('grid');
    const q = searchQuery.toLowerCase();

    const filtered = allLinks.filter(link => {
      const matchesTag = activeTag === 'all' || link.tags.includes(activeTag);
      const matchesSearch = !q
        || link.title.toLowerCase().includes(q)
        || (link.description || '').toLowerCase().includes(q)
        || link.tags.some(t => t.toLowerCase().includes(q));
      return matchesTag && matchesSearch;
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">Nenhum resultado encontrado.</div>';
      return;
    }

    grid.innerHTML = '';
    filtered.forEach(link => grid.appendChild(makeCard(link)));
  }

  function makeCard(link) {
    const card = document.createElement('div');
    card.className = 'card';

    let thumbHtml;
    if (link.thumbnail) {
      thumbHtml = `<img class="card-thumb" src="${link.thumbnail}" alt="${link.title}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-thumb-fallback" style="display:none">${link.title[0]}</div>`;
    } else {
      thumbHtml = `<div class="card-thumb-fallback">${link.title[0]}</div>`;
    }

    const tagsHtml = link.tags.map(tag =>
      `<span class="tag-pill" data-tag="${tag}">${tag.replace('#', '')}</span>`
    ).join('');

    card.innerHTML = `
      ${thumbHtml}
      <div class="card-body">
        <div class="card-title">${link.title}</div>
        <div class="card-desc">${link.description || ''}</div>
        <div class="card-tags">${tagsHtml}</div>
      </div>
      <div class="card-footer">
        <a class="btn-link" href="${link.url}" target="_blank" rel="noopener">Abrir →</a>
      </div>
    `;

    card.querySelectorAll('.tag-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const tag = pill.dataset.tag;
        activeTag = tag;
        document.querySelectorAll('.tab').forEach(t => {
          t.classList.toggle('active', t.textContent.startsWith(tag.replace('#', '')));
        });
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    return card;
  }

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  init();
</script>
</body>
</html>
